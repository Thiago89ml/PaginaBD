<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <main>
        <section class="contenedor">

            <h2>Formulario de Registro</h2>

            <form id="miFormulario" action="conexion.php" method="post">

                <label for="Usuario">Usuario</label>
                <input type="text" id="Usuario" name="Usuario" placeholder="Ingrese su usuario" required>

                <label for="Contrasena">Contraseña</label>
                <input type="password" id="Contrasena" name="Contrasena" placeholder="Ingrese su contraseña" required>

                <label for="Correo">Correo electrónico</label>
                <input type="email" id="Correo" name="Correo" placeholder="ejemplo@correo.com" required>

                <label for="Contacto">Contacto</label>
                <input type="tel" id="Contacto" name="Contacto" placeholder="099123456">

                <label for="Departamento">Departamento</label>
                <input type="text" id="Departamento" name="Departamento" placeholder="Ej: Montevideo">

                <button type="submit" id="btnAgregar">Agregar</button>
                <button type="reset">Limpiar</button>

            </form>

        </section>
    </main>

    <script src="script.js"></script>

</body>
</html>
